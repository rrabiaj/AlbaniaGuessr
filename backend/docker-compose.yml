version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: albaniaguessr-db
    environment:
      POSTGRES_DB: albaniaguessr
      POSTGRES_USER: albaniaguessr
      POSTGRES_PASSWORD: albaniaguessr123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U albaniaguessr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: albaniaguessr-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: albaniaguessr-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/albaniaguessr
      SPRING_DATASOURCE_USERNAME: albaniaguessr
      SPRING_DATASOURCE_PASSWORD: albaniaguessr123
      SPRING_REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata: